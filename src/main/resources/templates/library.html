<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Album Archive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- サイドバー PC表示時は左側、モバイルでは下部に表示-->
    <div class="container-fluid">
        <div class="row">
			<div class="d-md-none title">
				<h5 class="text-white px-3 pt-4 pb-3">Album Archive</h5>
			</div>
            <div class="col-md-2 sidebar order-2 order-md-1 flex-row text-white">
				<h5 class="d-none d-md-block px-3 pt-4">Album Archive</h5>
                <nav>
                    <!-- Homeリンク -->
                    <ul class="nav flex-row flex-md-column fw-bold">
                        <li class="nav-item flex-fill">
                            <a th:href="@{/AlbumArchive}" class="nav-link d-flex flex-column flex-md-row mt-2" 
                               th:classappend="${activeTab == 'home' ? 'active-tab' : ''}">
                               <i class="bi bi-house-door-fill me-md-2"></i>Home
                            </a>
                        </li>

                        <!-- Libraryリンク -->
                        <li class="nav-item flex-fill">
                            <a th:href="@{/AlbumArchive/library}" class="nav-link d-flex flex-column flex-md-row mt-2" 
                               th:classappend="${activeTab == 'library' ? 'active-tab' : ''}">
                               <i class="bi bi-music-note-list me-md-2"></i>Library
                            </a>
                        </li>

                        <!-- Addリンク -->
                        <li class="nav-item flex-fill">
                            <a th:href="@{/AlbumArchive/add}" class="nav-link d-flex flex-column flex-md-row mt-2" 
                               th:classappend="${activeTab == 'add' ? 'active-tab' : ''}">
                               <i class="bi bi-plus-square me-md-2"></i>Add
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>

			<!--メインコンテンツ-->
			<div class="col-md-10 main-content order-1 order-md-2 text-white">
                <div class="d-flex align-items-center justify-content-between pt-4 ps-4 pe-4">
				    <h1 class="text-white">Library</h1>

                        <!-- 並び替えセレクトボックス -->
                       <form th:action="@{/AlbumArchive/library}" method="GET" class="d-flex align-items-center">
                        <select name="sort" class="form-select-sort" onchange="this.form.submit()">
                                <option value="newest" th:selected="${sort == 'newest'}">Newest</option>
                                <option value="oldest" th:selected="${sort == 'oldest'}">Oldest</option>
                                <option value="rating" th:selected="${sort == 'rating'}">Top Rated</option>
                            </select>
                       </form>
                </div>

                <!-- アルバム一覧表示エリア -->
                 <!-- モバイル2列、PC5列 -->
                <div class="container-fluid mt-4">
                    <div th:if="${myAlbums != null and !#lists.isEmpty(myAlbums)}">
                    <div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4 px-4">
                        <!-- アルバムカード（繰り返し）-->
                        <div class="col" th:each="album : ${myAlbums}">
                            <a th:href="@{/AlbumArchive/library/details(id=${album.id})}" class="text-decoration-none">
                                <div class="card album-image h-100 border-0">
                                    <!-- アルバムジャケット画像 -->
                                    <img th:src="${album.imageUrl}"
                                     class="rounded-3"
                                     alt="Album Jacket"
                                     style="aspect-ratio: 1 / 1; object-fit: cover;">

                                    <!-- アルバム情報     -->
                                <div class="card-body p-2 text-center">
                                    <h6 class="card-title text-truncate mb-1" th:text="${album.albumName}">Album Name</h6>
                                    <p class="card-text small text-secondary text-truncate" th:text="${album.artistName}">Artist Name</p>
                                </div>
                                </div>
                            </a>
                        </div>
                    </div>

                    <nav aria-label="Page navigation">
                        <ul class="pagination justify-content-center">

                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages -1)}"
                                th:classappend="${i == pageCount} ? 'active'">
                            <a class="page-item-link"
                               th:href="@{/AlbumArchive/library(pageCount=${i}, sort=${sort})}"
                               th:text="${i + 1}">1</a>
                            </li>
                        </ul>
                    </nav>
                    </div>

                    <!-- DBが空の場合 -->
                     <div class="text-center mt-5"th:if="${myAlbums == null or #lists.isEmpty(myAlbums)}">
                        <h5>Your library is empty.</h5>
                     </div>
                        
                    
                  
                </div>

			</div>
		</div>
	</div>

</body>
</html>
